version: "3.8"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Calorie2026Secure!
      MYSQL_DATABASE: calorie_battle
      MYSQL_USER: calorie
      MYSQL_PASSWORD: Calorie2026Secure!
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: always
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: calorie_battle
      DB_USER: calorie
      DB_PASS: Calorie2026Secure!
      JWT_SECRET: docker-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: docker-jwt-refresh-secret-change
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_EXPIRES_IN: 7d
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: /api/v1
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql_data:
  uploads_data:
