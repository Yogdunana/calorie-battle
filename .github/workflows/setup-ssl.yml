name: Setup SSL

on:
  workflow_dispatch:

jobs:
  ssl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'OUTER_EOF'
          echo "=== 1. 安装certbot ==="
          apt-get update -qq
          apt-get install -y -qq certbot python3-certbot-nginx 2>&1 | tail -3

          echo ""
          echo "=== 2. 检查nginx是否运行 ==="
          systemctl is-active nginx

          echo ""
          echo "=== 3. 先配置80端口让域名可访问 ==="
          cat > /etc/nginx/sites-available/calorie-battle << 'NGINX'
          server {
              listen 80;
              server_name calorie.yogdunana.cn;
              client_max_body_size 10M;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_read_timeout 60s;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }

          server {
              listen 8080;
              server_name _;
              client_max_body_size 10M;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_read_timeout 60s;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          NGINX
          ln -sf /etc/nginx/sites-available/calorie-battle /etc/nginx/sites-enabled/calorie-battle
          rm -f /etc/nginx/sites-enabled/default 2>/dev/null
          nginx -t 2>&1 && systemctl reload nginx
          echo "nginx配置完成"

          echo ""
          echo "=== 4. 申请SSL证书 ==="
          certbot --nginx -d calorie.yogdunana.cn --non-interactive --agree-tos --email noreply@yogdunana.com --redirect 2>&1

          echo ""
          echo "=== 5. 验证证书 ==="
          ls -la /etc/letsencrypt/live/calorie.yogdunana.cn/ 2>/dev/null

          echo ""
          echo "=== 6. 验证HTTPS ==="
          curl -s -o /dev/null -w "HTTP: %{http_code}\n" http://calorie.yogdunana.cn/
          curl -sk -o /dev/null -w "HTTPS: %{http_code}\n" https://calorie.yogdunana.cn/

          echo ""
          echo "=== DONE ==="
          OUTER_EOF
