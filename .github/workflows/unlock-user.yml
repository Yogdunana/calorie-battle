name: Unlock User

on:
  workflow_dispatch:

jobs:
  unlock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          cat > /tmp/unlock.sh << 'LOCALEOF'
          #!/bin/bash
          cd /opt/calorie-battle/calorie-battle-server
          [ -f .env ] && export $(grep -v '^#' .env | grep -v '^$' | xargs)
          node -e "
          const mysql = require('mysql2/promise');
          (async () => {
            const conn = await mysql.createConnection({host:process.env.DB_HOST,port:parseInt(process.env.DB_PORT||3306),user:process.env.DB_USER,password:process.env.DB_PASS,database:process.env.DB_NAME});
            await conn.execute('UPDATE users SET status=\"active\", login_fail_count=0, locked_until=NULL WHERE account=\"1120240002\"');
            const [rows] = await conn.execute('SELECT account, status, login_fail_count, locked_until FROM users WHERE account=\"1120240002\"');
            console.log(JSON.stringify(rows[0]));
            await conn.end();
          })();
          "
          LOCALEOF

          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            scp -o StrictHostKeyChecking=no -P ${{ secrets.SERVER_PORT }} \
            /tmp/unlock.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/unlock.sh

          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash /tmp/unlock.sh'
