name: Fix Nginx

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'OUTER_EOF'
          echo "=== 1. 检查nginx配置 ==="
          nginx -t 2>&1 || echo "nginx配置有误"

          echo ""
          echo "=== 2. 检查当前nginx配置文件 ==="
          cat /etc/nginx/sites-available/calorie-battle 2>/dev/null | head -5 || echo "配置文件不存在"
          ls -la /etc/nginx/sites-enabled/ 2>/dev/null

          echo ""
          echo "=== 3. 检查PM2状态 ==="
          pm2 list 2>/dev/null

          echo ""
          echo "=== 4. 检查3001端口 ==="
          curl -s -o /dev/null -w "3001: %{http_code}\n" http://127.0.0.1:3001/api/v1/health

          echo ""
          echo "=== 5. 检查8080端口 ==="
          curl -s -o /dev/null -w "8080: %{http_code}\n" http://127.0.0.1:8080/

          echo ""
          echo "=== 6. 修复nginx ==="
          # 删除旧配置，写入新的简单配置
          rm -f /etc/nginx/sites-enabled/calorie-battle 2>/dev/null
          
          # 检查是否有SSL证书
          HAS_SSL=0
          if [ -f /etc/letsencrypt/live/calorie.yogdunana.cn/fullchain.pem ]; then
            HAS_SSL=1
            echo "SSL证书存在"
          else
            echo "SSL证书不存在"
          fi

          # 写入8080端口配置（最简单可靠）
          cat > /etc/nginx/sites-available/calorie-battle << 'NGINX'
          server {
              listen 8080;
              server_name _;
              client_max_body_size 10M;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_read_timeout 60s;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          NGINX

          ln -sf /etc/nginx/sites-available/calorie-battle /etc/nginx/sites-enabled/calorie-battle

          # 删除default配置避免冲突
          rm -f /etc/nginx/sites-enabled/default 2>/dev/null

          echo ""
          echo "=== 7. 测试nginx配置 ==="
          nginx -t 2>&1

          echo ""
          echo "=== 8. 重启nginx ==="
          systemctl restart nginx 2>&1 || service nginx restart 2>&1
          sleep 2

          echo ""
          echo "=== 9. 验证 ==="
          curl -s -o /dev/null -w "8080: %{http_code}\n" http://127.0.0.1:8080/
          curl -s -o /dev/null -w "API: %{http_code}\n" http://127.0.0.1:8080/api/v1/health
          curl -s http://127.0.0.1:8080/ | grep -o "深北莫计协" | head -1

          echo ""
          echo "=== DONE ==="
          OUTER_EOF
