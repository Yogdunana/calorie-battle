name: Server Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Package code
        run: |
          cd $GITHUB_WORKSPACE
          tar czf /tmp/calorie-battle.tar.gz \
            --exclude='node_modules' --exclude='.git' --exclude='data' \
            --exclude='*.db' --exclude='uploads' --exclude='.trae' \
            calorie-battle-server/ calorie-battle-web/ deploy.sh
          ls -lh /tmp/calorie-battle.tar.gz

      - name: Upload to server via SCP
        run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            scp -o StrictHostKeyChecking=no -P ${{ secrets.SERVER_PORT }} \
            /tmp/calorie-battle.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

      - name: Deploy on server
        run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "SMTP_PASS='${{ secrets.SMTP_PASSWORD }}' bash -s" << 'DEPLOY'
          set -e

          echo "============================================"
          echo "  Step 1: 安装基础环境"
          echo "============================================"
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq 2>/dev/null || true
          apt-get install -y -qq curl wget git sshpass > /dev/null 2>&1 || true

          if command -v node &>/dev/null && node -v | grep -q "v20"; then
              echo "  Node.js $(node -v) ✓"
          else
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash - 2>/dev/null
              apt-get install -y -qq nodejs
              echo "  Node.js $(node -v) ✓"
          fi

          if command -v mysql &>/dev/null; then
              echo "  MySQL ✓"
          else
              apt-get install -y -qq mysql-server > /dev/null 2>&1
          fi
          service mysql start 2>/dev/null || systemctl start mysql 2>/dev/null || true
          sleep 2

          if ! command -v pm2 &>/dev/null; then
              npm install -g pm2 > /dev/null 2>&1
          fi
          echo "  PM2 ✓"

          if ! command -v nginx &>/dev/null; then
              apt-get install -y -qq nginx > /dev/null 2>&1
          fi
          echo "  Nginx ✓"

          echo ""
          echo "============================================"
          echo "  Step 2: 解压代码"
          echo "============================================"
          rm -rf /opt/calorie-battle
          mkdir -p /opt/calorie-battle
          tar xzf /tmp/calorie-battle.tar.gz -C /opt/calorie-battle/
          rm -f /tmp/calorie-battle.tar.gz
          echo "  代码解压完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 3: 配置数据库"
          echo "============================================"
          mysql -u root <<'SQL' || true
          CREATE DATABASE IF NOT EXISTS calorie_battle CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
          CREATE USER IF NOT EXISTS 'calorie'@'localhost' IDENTIFIED BY 'Calorie2026Secure!';
          GRANT ALL PRIVILEGES ON calorie_battle.* TO 'calorie'@'localhost';
          FLUSH PRIVILEGES;
          -- 添加 email 列（忽略已存在的错误）
          USE calorie_battle;
          SET @dbname = DATABASE();
          SET @tablename = 'users';
          SET @columnname = 'email';
          SET @preparedStatement = (SELECT IF(
            (SELECT COUNT(*) FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = @dbname AND TABLE_NAME = @tablename AND COLUMN_NAME = @columnname) > 0,
            'SELECT 1',
            'ALTER TABLE users ADD COLUMN email VARCHAR(100) DEFAULT NULL UNIQUE AFTER avatar'
          ));
          PREPARE alterIfNotExists FROM @preparedStatement;
          EXECUTE alterIfNotExists;
          DEALLOCATE PREPARE alterIfNotExists;
          SQL
          echo "  数据库配置完成 ✓" || echo "  数据库配置完成（email列可能已存在）✓"

          echo ""
          echo "============================================"
          echo "  Step 4: 安装后端依赖"
          echo "============================================"
          cd /opt/calorie-battle/calorie-battle-server
          npm install 2>&1 | tail -1
          echo "  后端依赖完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 5: 配置环境变量"
          echo "============================================"
          JWT_SECRET=$(openssl rand -hex 32)
          JWT_REFRESH_SECRET=$(openssl rand -hex 32)
          ENV_FILE="/opt/calorie-battle/calorie-battle-server/.env"
          printf 'PORT=3001\nNODE_ENV=production\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_NAME=calorie_battle\nDB_USER=calorie\nDB_PASS=Calorie2026Secure!\nJWT_SECRET=%s\nJWT_REFRESH_SECRET=%s\nJWT_EXPIRES_IN=24h\nJWT_REFRESH_EXPIRES_IN=7d\nUPLOAD_DIR=/opt/calorie-battle/calorie-battle-server/uploads\nMAX_FILE_SIZE=10485760\nSMTP_HOST=smtp.feishu.cn\nSMTP_PORT=465\nSMTP_USER=noreply@yogdunana.com\nSMTP_PASS=%s\n' "$JWT_SECRET" "$JWT_REFRESH_SECRET" "$SMTP_PASS" > "$ENV_FILE"
          mkdir -p /opt/calorie-battle/calorie-battle-server/uploads
          echo "  环境变量配置完成 ✓"
          echo "  .env 内容:"
          cat "$ENV_FILE"

          echo ""
          echo "============================================"
          echo "  Step 6: 构建前端"
          echo "============================================"
          cd /opt/calorie-battle/calorie-battle-web
          npm install --legacy-peer-deps 2>&1 | tail -1
          npx vite build 2>&1 | tail -3
          echo "  前端构建完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 7: 启动后端 (PM2)"
          echo "============================================"
          cd /opt/calorie-battle/calorie-battle-server
          pm2 delete calorie-battle 2>/dev/null || true
          pm2 start server.js --name calorie-battle
          pm2 save
          pm2 startup 2>/dev/null | tail -1 | bash 2>/dev/null || true
          echo "  等待后端启动..."
          sleep 8
          echo "  PM2 日志 (最近10行):"
          pm2 logs calorie-battle --lines 10 --nostream 2>&1 || true
          echo "  后端已启动 ✓"

          echo ""
          echo "============================================"
          echo "  Step 8: 配置 Nginx"
          echo "============================================"
          # 生成 nginx 配置（SSL证书存在时才配置HTTPS）
          if [ -f /etc/letsencrypt/live/calorie.yogdunana.cn/fullchain.pem ]; then
          cat > /etc/nginx/sites-available/calorie-battle <<'NGINX'
          # HTTPS - 域名
          server {
              listen 443 ssl http2;
              server_name calorie.yogdunana.cn;
              ssl_certificate /etc/letsencrypt/live/calorie.yogdunana.cn/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/calorie.yogdunana.cn/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              add_header Strict-Transport-Security "max-age=31536000" always;
              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }
              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }
              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          # HTTP -> HTTPS 重定向
          server {
              listen 80;
              server_name calorie.yogdunana.cn;
              return 301 https://$host$request_uri;
          }
          NGINX
          echo "  SSL证书存在，已配置HTTPS ✓"
          else
          cat > /etc/nginx/sites-available/calorie-battle <<'NGINX'
          # HTTP - 域名（无SSL证书，直接HTTP提供服务）
          server {
              listen 80;
              server_name calorie.yogdunana.cn;
              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }
              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }
              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          NGINX
          echo "  无SSL证书，仅配置HTTP ✓"
          fi
          # 兼容 8080 端口
          server {
              listen 8080;
              server_name _;
              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }
              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }
              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          NGINX
          ln -sf /etc/nginx/sites-available/calorie-battle /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
          nginx -t 2>&1
          service nginx restart 2>/dev/null || systemctl restart nginx 2>/dev/null || true
          echo "  Nginx 配置完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 9: 验证部署"
          echo "============================================"
          echo ""
          echo "--- PM2 ---"
          pm2 status
          echo ""
          echo "--- 前端 (8080) ---"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:8080/ || true
          echo ""
          echo "--- API (3001) ---"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" http://127.0.0.1:3001/api/v1/health || true
          echo ""
          echo "--- 登录测试 ---"
          curl -s -X POST http://127.0.0.1:3001/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"account":"admin","password":"admin123456"}' | head -c 200 || true
          echo ""
          echo ""
          echo "============================================"
          echo "  部署完成! 访问: http://101.237.129.33:8080"
          echo "  管理员: admin / admin123456"
          echo "============================================"
          DEPLOY

      - name: Summary
        if: always()
        run: |
          echo "## 部署结果: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- 访问: http://${{ secrets.SERVER_HOST }}:8080" >> $GITHUB_STEP_SUMMARY
