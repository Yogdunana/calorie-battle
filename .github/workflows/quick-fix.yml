name: Quick Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'cat > /tmp/fix.sh << '\''SCRIPT'\''
          #!/bin/bash
          echo "=== PM2状态 ==="
          pm2 list 2>&1

          echo "=== PM2日志 ==="
          pm2 logs calorie-battle --lines 30 --nostream 2>&1

          echo "=== .env文件 ==="
          cat /opt/calorie-battle/calorie-battle-server/.env 2>/dev/null || echo "无.env"

          echo "=== MySQL连接测试 ==="
          if [ -f /opt/calorie-battle/calorie-battle-server/.env ]; then
            export $(grep -v '^#' /opt/calorie-battle/calorie-battle-server/.env | grep -v '^$' | xargs)
            echo "DB_HOST=$DB_HOST DB_NAME=$DB_NAME DB_PORT=$DB_PORT"
            if command -v mysql &>/dev/null; then
              mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "SELECT 1" 2>&1
            else
              echo "mysql客户端未安装"
              # 用node测试
              cd /opt/calorie-battle/calorie-battle-server
              node -e "
              const mysql = require('mysql2/promise');
              (async () => {
                try {
                  const conn = await mysql.createConnection({host:process.env.DB_HOST,port:parseInt(process.env.DB_PORT||3306),user:process.env.DB_USER,password:process.env.DB_PASS,database:process.env.DB_NAME});
                  console.log('MySQL连接成功!');
                  const [rows] = await conn.execute('SELECT COUNT(*) as cnt FROM users');
                  console.log('用户数:', rows[0].cnt);
                  await conn.end();
                } catch(e) { console.error('MySQL连接失败:', e.message); }
              })();
              " 2>&1
            fi
          fi

          echo "=== 重启PM2 ==="
          cd /opt/calorie-battle/calorie-battle-server
          pm2 restart calorie-battle 2>&1
          sleep 5

          echo "=== 验证 ==="
          curl -s http://127.0.0.1:3001/api/v1/health 2>&1
          echo ""
          curl -s -o /dev/null -w "8080: %{http_code}\n" http://127.0.0.1:8080/api/v1/health

          echo "=== DONE ==="
          SCRIPT
          chmod +x /tmp/fix.sh'

          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash /tmp/fix.sh'
