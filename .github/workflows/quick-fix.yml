name: Quick Fix V2

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          cat > /tmp/fix.sh << 'LOCALEOF'
          #!/bin/bash
          cd /opt/calorie-battle/calorie-battle-server
          [ -f .env ] && export $(grep -v '^#' .env | grep -v '^$' | xargs)
          echo "=== 重置密码 ==="
          node -e "
          const bcrypt = require('bcryptjs');
          const mysql = require('mysql2/promise');
          (async () => {
            const hash = await bcrypt.hash('bill6666', 10);
            const conn = await mysql.createConnection({host:process.env.DB_HOST,port:parseInt(process.env.DB_PORT||3306),user:process.env.DB_USER,password:process.env.DB_PASS,database:process.env.DB_NAME});
            await conn.execute('UPDATE users SET password_hash=?, status=\"active\", login_fail_count=0, locked_until=NULL WHERE account=\"1120240002\"', [hash]);
            const [rows] = await conn.execute('SELECT account, status, login_fail_count FROM users WHERE account=\"1120240002\"');
            console.log('密码重置成功:', JSON.stringify(rows[0]));
            await conn.end();
          })();
          "
          echo ""
          echo "=== 验证登录 ==="
          curl -s http://127.0.0.1:3001/api/v1/auth/login -X POST -H "Content-Type: application/json" -d '{"account":"1120240002","password":"bill6666"}'
          echo ""
          echo "=== 重启PM2 ==="
          pm2 restart calorie-battle 2>&1
          sleep 3
          echo ""
          echo "=== 验证 ==="
          curl -s -o /dev/null -w "8080: %{http_code}\n" http://127.0.0.1:8080/api/v1/health
          echo "=== DONE ==="
          LOCALEOF

          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            scp -o StrictHostKeyChecking=no -P ${{ secrets.SERVER_PORT }} \
            /tmp/fix.sh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/fix.sh

          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash /tmp/fix.sh'
