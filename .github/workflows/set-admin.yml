name: Set Admin V5

on:
  workflow_dispatch:

jobs:
  set-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'OUTER_EOF'
          cd /opt/calorie-battle/calorie-battle-server
          [ -f .env ] && export $(grep -v '^#' .env | grep -v '^$' | xargs)

          node -e "
          require('dotenv').config();
          const config = require('./src/config');
          const { Sequelize } = require('sequelize');

          let sequelize;
          if (config.db.dialect === 'mysql') {
            sequelize = new Sequelize(config.db.name, config.db.user, config.db.password, {
              host: config.db.host, port: config.db.port, dialect: 'mysql', logging: false
            });
          } else {
            sequelize = new Sequelize({ dialect: 'sqlite', storage: config.db.storage, logging: false });
          }

          (async () => {
            try {
              // 先查看所有表
              const [tables] = await sequelize.query('SHOW TABLES');
              console.log('所有表:', JSON.stringify(tables));

              // 尝试不同的表名
              let tableName = 'Users';
              try {
                await sequelize.query('SELECT 1 FROM Users LIMIT 1');
              } catch(e) {
                tableName = 'users';
                try {
                  await sequelize.query('SELECT 1 FROM users LIMIT 1');
                } catch(e2) {
                  console.log('Users和users都不存在');
                  process.exit(1);
                }
              }
              console.log('使用表名:', tableName);

              const [admins] = await sequelize.query('SELECT account, username, role, status FROM ' + tableName + ' WHERE role = \"admin\"');
              console.log('当前admin:', JSON.stringify(admins));

              const [user] = await sequelize.query('SELECT account, username, role, status FROM ' + tableName + ' WHERE account = \"1120240002\"');
              console.log('1120240002:', JSON.stringify(user));

              if (user.length > 0) {
                await sequelize.query('UPDATE ' + tableName + ' SET role = \"admin\", status = \"active\" WHERE account = \"1120240002\"');
                console.log('已将1120240002设为admin');
              } else {
                console.log('1120240002不存在');
              }

              await sequelize.query('DELETE FROM ' + tableName + ' WHERE account = \"admin\"');
              console.log('已删除旧admin');

              const [final] = await sequelize.query('SELECT account, username, role, status FROM ' + tableName + ' WHERE role = \"admin\"');
              console.log('最终admin:', JSON.stringify(final));
            } catch(e) {
              console.error('Error:', e.message);
            }
            process.exit(0);
          })();
          "

          sleep 2
          pm2 restart calorie-battle 2>/dev/null
          sleep 3
          echo ""
          echo "=== 登录测试 ==="
          curl -s http://127.0.0.1:3001/api/v1/auth/login -X POST -H "Content-Type: application/json" -d '{"account":"1120240002","password":"admin123456"}'
          echo ""
          OUTER_EOF
