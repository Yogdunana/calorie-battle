name: Set Admin V3

on:
  workflow_dispatch:

jobs:
  set-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'EOF'
          # 从PM2环境变量中获取数据库配置
          cd /opt/calorie-battle/calorie-battle-server
          eval $(pm2 env 0 2>/dev/null | grep -E "^(DB_HOST|DB_PORT|DB_NAME|DB_USER|DB_PASS)=")

          echo "DB_HOST=$DB_HOST"
          echo "DB_NAME=$DB_NAME"
          echo "DB_USER=$DB_USER"

          if [ -z "$DB_HOST" ]; then
            echo "ERROR: DB环境变量未找到，尝试从.env读取"
            if [ -f .env ]; then
              source .env
              echo "DB_HOST=$DB_HOST"
            else
              echo "ERROR: 无.env文件"
              exit 1
            fi
          fi

          echo ""
          echo "=== 当前admin账号 ==="
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "SELECT account, username, role, status FROM Users WHERE role='admin';" 2>/dev/null

          echo ""
          echo "=== 1120240002 当前状态 ==="
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "SELECT account, username, role, status FROM Users WHERE account='1120240002';" 2>/dev/null

          echo ""
          echo "=== 操作 ==="
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "
            UPDATE Users SET role='admin', status='active' WHERE account='1120240002';
            DELETE FROM Users WHERE account='admin';
          " 2>/dev/null

          echo ""
          echo "=== 验证 ==="
          mysql -h "$DB_HOST" -P "${DB_PORT:-3306}" -u "$DB_USER" -p"$DB_PASS" "$DB_NAME" -e "SELECT account, username, role, status FROM Users WHERE role='admin';" 2>/dev/null

          echo ""
          echo "=== 重启后端 ==="
          pm2 restart all 2>/dev/null
          sleep 3

          echo ""
          echo "=== 登录测试 ==="
          curl -s http://127.0.0.1:3001/api/v1/auth/login -X POST -H "Content-Type: application/json" -d '{"account":"1120240002","password":"admin123456"}'

          echo ""
          echo "=== DONE ==="
          EOF
