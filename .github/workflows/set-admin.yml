name: Set Admin

on:
  workflow_dispatch:

jobs:
  set-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'EOF'
          cd /opt/calorie-battle/calorie-battle-server

          echo "=== 1. 查看当前admin账号 ==="
          node -e "
          const { User } = require('./src/models');
          (async () => {
            const admins = await User.findAll({ where: { role: 'admin' } });
            admins.forEach(u => console.log('Admin:', u.account, u.username, u.status));
            const user = await User.findOne({ where: { account: '1120240002' } });
            if (user) console.log('1120240002:', user.username, 'role='+user.role, 'status='+user.status);
            else console.log('1120240002: 不存在');
          })().then(() => process.exit(0));
          "

          echo ""
          echo "=== 2. 设置1120240002为管理员 ==="
          node -e "
          const { User } = require('./src/models');
          (async () => {
            // 如果1120240002不存在，先创建
            let user = await User.findOne({ where: { account: '1120240002' } });
            if (!user) {
              const { hashPassword } = require('./src/utils/password');
              const hash = await hashPassword('admin123456');
              user = await User.create({ account: '1120240002', username: '管理员', password_hash: hash, role: 'admin', status: 'active' });
              console.log('Created 1120240002 as admin');
            } else {
              await user.update({ role: 'admin', status: 'active' });
              console.log('Updated 1120240002 to admin');
            }
            // 删除旧的admin账号
            const oldAdmin = await User.findOne({ where: { account: 'admin' } });
            if (oldAdmin) {
              await oldAdmin.destroy();
              console.log('Deleted old admin account');
            }
            // 验证
            const admins = await User.findAll({ where: { role: 'admin' } });
            console.log('Current admins:', admins.map(u => u.account + '(' + u.username + ')').join(', '));
          })().then(() => process.exit(0));
          "

          echo ""
          echo "=== 3. 重启后端 ==="
          cd /opt/calorie-battle/calorie-battle-server && pm2 restart all 2>/dev/null || node src/server.js &
          sleep 3

          echo ""
          echo "=== 4. 验证登录 ==="
          curl -s http://127.0.0.1:3001/api/v1/auth/login -X POST -H "Content-Type: application/json" -d '{"account":"1120240002","password":"admin123456"}' | head -200

          echo ""
          echo "=== DONE ==="
          EOF
