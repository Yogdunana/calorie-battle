name: Set Admin V2

on:
  workflow_dispatch:

jobs:
  set-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'EOF'
          cd /opt/calorie-battle/calorie-battle-server

          # 找到数据库文件
          DBFILE=$(ls -t data/*.db 2>/dev/null | head -1)
          if [ -z "$DBFILE" ]; then
            DBFILE=$(find . -name "*.db" -not -path "./node_modules/*" | head -1)
          fi
          echo "Database: $DBFILE"

          if [ -z "$DBFILE" ]; then
            echo "ERROR: No database found!"
            exit 1
          fi

          echo ""
          echo "=== 当前admin账号 ==="
          sqlite3 "$DBFILE" "SELECT account, username, role, status FROM Users WHERE role='admin';"

          echo ""
          echo "=== 1120240002 当前状态 ==="
          sqlite3 "$DBFILE" "SELECT account, username, role, status FROM Users WHERE account='1120240002';"

          echo ""
          echo "=== 操作：设置1120240002为admin，删除旧admin ==="
          # 如果1120240002存在，更新为admin
          sqlite3 "$DBFILE" "UPDATE Users SET role='admin', status='active' WHERE account='1120240002';"
          # 如果不存在，不管（用户需要先注册）
          # 删除旧的admin账号
          sqlite3 "$DBFILE" "DELETE FROM Users WHERE account='admin';"

          echo ""
          echo "=== 验证结果 ==="
          sqlite3 "$DBFILE" "SELECT account, username, role, status FROM Users WHERE role='admin';"

          echo ""
          echo "=== 重启后端 ==="
          pm2 restart all 2>/dev/null
          sleep 3

          echo ""
          echo "=== 登录测试 ==="
          curl -s http://127.0.0.1:3001/api/v1/auth/login -X POST -H "Content-Type: application/json" -d '{"account":"1120240002","password":"admin123456"}'

          echo ""
          echo "=== DONE ==="
          EOF
