name: Setup Domain & SSL

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Install certbot and configure Nginx
        run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'DEPLOY'
          set -e

          echo "============================================"
          echo "  Step 1: 安装 certbot"
          echo "============================================"
          apt-get update -qq 2>/dev/null || true
          apt-get install -y -qq certbot python3-certbot-nginx 2>/dev/null || true
          echo "  certbot 安装完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 2: 配置 Nginx (HTTP 先验证域名)"
          echo "============================================"
          cat > /etc/nginx/sites-available/calorie-battle <<'NGINX'
          server {
              listen 80;
              server_name calorie.yogdunana.cn;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }

          # 保留 8080 端口配置（兼容）
          server {
              listen 8080;
              server_name _;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          NGINX

          ln -sf /etc/nginx/sites-available/calorie-battle /etc/nginx/sites-enabled/
          nginx -t 2>&1
          service nginx restart 2>/dev/null || systemctl restart nginx 2>/dev/null || true
          echo "  Nginx 配置完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 3: 申请 SSL 证书"
          echo "============================================"
          # 停止 nginx 以释放 80 端口给 certbot standalone
          service nginx stop 2>/dev/null || systemctl stop nginx 2>/dev/null || true
          sleep 2

          certbot certonly --standalone \
            -d calorie.yogdunana.cn \
            --non-interactive \
            --agree-tos \
            --email noreply@yogdunana.com \
            --no-eff-email 2>&1

          echo ""
          echo "============================================"
          echo "  Step 4: 配置 HTTPS"
          echo "============================================"
          cat > /etc/nginx/sites-available/calorie-battle <<'NGINX'
          # HTTP -> HTTPS 重定向
          server {
              listen 80;
              server_name calorie.yogdunana.cn;
              return 301 https://$host$request_uri;
          }

          # HTTPS
          server {
              listen 443 ssl http2;
              server_name calorie.yogdunana.cn;

              ssl_certificate /etc/letsencrypt/live/calorie.yogdunana.cn/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/calorie.yogdunana.cn/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
              ssl_prefer_server_ciphers off;
              ssl_session_cache shared:SSL:10m;
              ssl_session_timeout 10m;

              # Security headers
              add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
              add_header X-Frame-Options DENY always;
              add_header X-Content-Type-Options nosniff always;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }

          # 保留 8080 端口（兼容）
          server {
              listen 8080;
              server_name _;

              location / {
                  root /opt/calorie-battle/calorie-battle-web/dist;
                  index index.html;
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://127.0.0.1:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  proxy_read_timeout 60s;
                  client_max_body_size 10M;
              }

              location /uploads/ {
                  alias /opt/calorie-battle/calorie-battle-server/uploads/;
                  expires 30d;
              }
          }
          NGINX

          nginx -t 2>&1
          service nginx start 2>/dev/null || systemctl start nginx 2>/dev/null || true
          echo "  HTTPS 配置完成 ✓"

          echo ""
          echo "============================================"
          echo "  Step 5: 配置证书自动续期"
          echo "============================================"
          # 添加 cron 任务：每天凌晨 3 点检查续期
          (crontab -l 2>/dev/null | grep -v certbot; echo "0 3 * * * certbot renew --quiet --post-hook 'systemctl reload nginx'") | crontab -
          echo "  自动续期已配置 ✓"

          echo ""
          echo "============================================"
          echo "  Step 6: 验证"
          echo "============================================"
          echo "--- HTTP (应重定向到 HTTPS) ---"
          curl -s -o /dev/null -w "HTTP %{http_code} -> %{redirect_url}\n" http://calorie.yogdunana.cn/ 2>/dev/null || echo "无法从服务器内部验证"
          echo ""
          echo "--- HTTPS ---"
          curl -s -o /dev/null -w "HTTP %{http_code}\n" https://calorie.yogdunana.cn/ 2>/dev/null || echo "无法从服务器内部验证"
          echo ""
          echo "--- 证书信息 ---"
          echo | openssl s_client -connect calorie.yogdunana.cn:443 -servername calorie.yogdunana.cn 2>/dev/null | openssl x509 -noout -subject -dates 2>/dev/null || echo "证书信息获取失败"

          echo ""
          echo "============================================"
          echo "  配置完成!"
          echo "  HTTPS: https://calorie.yogdunana.cn"
          echo "  HTTP:  http://calorie.yogdunana.cn (自动跳转 HTTPS)"
          echo "  兼容:  http://101.237.129.33:8080"
          echo "============================================"
          DEPLOY

      - name: Summary
        if: always()
        run: |
          echo "## 域名 & SSL 配置: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **域名**: https://calorie.yogdunana.cn" >> $GITHUB_STEP_SUMMARY
          echo "- **证书**: Let's Encrypt (自动续期)" >> $GITHUB_STEP_SUMMARY
