name: Simple Fix

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'EOF'
          cd /opt/calorie-battle/calorie-battle-web
          rm -rf dist
          echo "=== 构建 ==="
          npx vite build --mode production 2>&1
          echo ""
          echo "=== dist内容 ==="
          find dist -type f | head -20
          echo ""
          echo "=== index.html ==="
          cat dist/index.html
          echo ""
          echo "=== 验证JS存在 ==="
          JS=$(grep -o 'src="[^"]*"' dist/index.html | head -1 | sed 's/src="//;s/"//')
          echo "引用: $JS"
          test -f "dist$JS" && echo "存在✓" || echo "不存在✗"
          echo ""
          systemctl restart nginx
          echo "=== 完成 ==="
          EOF
