name: Find DB

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'EOF'
          echo "=== 查找数据库 ==="
          find /opt/calorie-battle -name "*.db" -not -path "*/node_modules/*" 2>/dev/null
          echo ""
          echo "=== database.js配置 ==="
          cat /opt/calorie-battle/calorie-battle-server/src/config/database.js
          echo ""
          echo "=== data目录 ==="
          ls -la /opt/calorie-battle/calorie-battle-server/data/ 2>/dev/null || echo "无data目录"
          echo ""
          echo "=== 根目录db ==="
          ls -la /opt/calorie-battle/*.db 2>/dev/null || echo "无"
          echo ""
          echo "=== sqlite3是否安装 ==="
          which sqlite3 2>/dev/null || echo "sqlite3未安装"
          EOF
