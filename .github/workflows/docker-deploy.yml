name: Docker Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'OUTER_EOF'
          set +e

          echo "=== 1. 检查Docker ==="
          docker --version
          docker compose version 2>/dev/null || docker-compose --version 2>/dev/null

          echo ""
          echo "=== 2. 停止旧服务 ==="
          pm2 stop calorie-battle 2>/dev/null || true
          systemctl stop nginx 2>/dev/null || true

          echo ""
          echo "=== 3. 准备项目目录 ==="
          rm -rf /opt/calorie-battle-docker
          mkdir -p /opt/calorie-battle-docker
          cd /opt/calorie-battle-docker

          echo ""
          echo "=== 4. 拉取代码 ==="
          git clone https://github.com/Yogdunana/calorie-battle.git . 2>&1 | tail -5
          echo "代码拉取完成"

          echo ""
          echo "=== 4.1 验证关键文件 ==="
          ls -la nginx.conf Dockerfile Dockerfile.web docker-compose.yml .dockerignore 2>&1

          echo ""
          echo "=== 5. 停止旧Docker容器 ==="
          docker compose down 2>&1

          echo ""
          echo "=== 5.1 清除Docker构建缓存 ==="
          docker builder prune -f 2>&1

          echo ""
          echo "=== 6. 构建并启动 ==="
          docker compose up -d --build 2>&1
          BUILD_EXIT=$?
          echo "构建退出码: $BUILD_EXIT"

          echo ""
          echo "=== 7. 等待服务启动 ==="
          sleep 20

          echo ""
          echo "=== 8. 检查容器状态 ==="
          docker compose ps 2>&1

          echo ""
          echo "=== 9. 检查后端日志 ==="
          docker compose logs backend --tail 30 2>&1

          echo ""
          echo "=== 10. 验证 ==="
          curl -s -o /dev/null -w "前端: %{http_code}\n" http://127.0.0.1:8080/ 2>&1
          curl -s -o /dev/null -w "API: %{http_code}\n" http://127.0.0.1:8080/api/v1/health 2>&1

          echo ""
          echo "=== DONE ==="
          OUTER_EOF
