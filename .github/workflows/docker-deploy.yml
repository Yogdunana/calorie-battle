name: Docker Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' << 'OUTER_EOF'
          echo "=== 1. 检查Docker ==="
          docker --version
          docker compose version 2>/dev/null || docker-compose --version 2>/dev/null

          echo ""
          echo "=== 2. 停止旧服务(非Docker) ==="
          pm2 stop calorie-battle 2>/dev/null || true
          systemctl stop nginx 2>/dev/null || true

          echo ""
          echo "=== 3. 创建项目目录 ==="
          mkdir -p /opt/calorie-battle-docker
          cd /opt/calorie-battle-docker

          echo ""
          echo "=== 4. 拉取代码 ==="
          # 清理旧文件
          rm -rf calorie-battle-docker
          git clone https://github.com/Yogdunana/calorie-battle.git . 2>&1 | tail -3

          echo ""
          echo "=== 5. 停止旧Docker容器 ==="
          docker compose down 2>/dev/null || true

          echo ""
          echo "=== 6. 构建并启动 ==="
          docker compose up -d --build 2>&1

          echo ""
          echo "=== 7. 等待服务启动 ==="
          sleep 15

          echo ""
          echo "=== 8. 检查容器状态 ==="
          docker compose ps

          echo ""
          echo "=== 9. 检查后端日志 ==="
          docker compose logs backend --tail 20 2>&1

          echo ""
          echo "=== 10. 验证 ==="
          curl -s -o /dev/null -w "前端: %{http_code}\n" http://127.0.0.1:8080/
          curl -s -o /dev/null -w "API: %{http_code}\n" http://127.0.0.1:8080/api/v1/health

          echo ""
          echo "=== DONE ==="
          OUTER_EOF
