name: Docker Deploy V2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y sshpass
      - run: |
          # 先上传脚本到服务器
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'cat > /tmp/deploy.sh << '\''SCRIPT'\''
          #!/bin/bash
          set +e

          echo "=== 1. 检查Docker ==="
          docker --version
          docker compose version 2>/dev/null || docker-compose --version 2>/dev/null

          echo "=== 2. 停止旧服务 ==="
          pm2 stop calorie-battle 2>/dev/null
          systemctl stop nginx 2>/dev/null

          echo "=== 3. 准备项目目录 ==="
          rm -rf /opt/calorie-battle-docker
          mkdir -p /opt/calorie-battle-docker
          cd /opt/calorie-battle-docker

          echo "=== 4. 拉取代码 ==="
          git clone https://github.com/Yogdunana/calorie-battle.git . 2>&1 | tail -5

          echo "=== 4.1 验证关键文件 ==="
          ls -la nginx.conf Dockerfile Dockerfile.web docker-compose.yml .dockerignore

          echo "=== 5. 停止旧Docker容器 ==="
          docker compose down 2>&1

          echo "=== 5.1 清除构建缓存 ==="
          docker builder prune -f 2>&1

          echo "=== 6. 构建并启动 ==="
          docker compose up -d --build 2>&1
          echo "构建退出码: $?"

          echo "=== 7. 等待启动 ==="
          sleep 20

          echo "=== 8. 容器状态 ==="
          docker compose ps 2>&1

          echo "=== 9. 后端日志 ==="
          docker compose logs backend --tail 30 2>&1

          echo "=== 10. 验证 ==="
          curl -s -o /dev/null -w "前端: %{http_code}\n" http://127.0.0.1:8080/
          curl -s -o /dev/null -w "API: %{http_code}\n" http://127.0.0.1:8080/api/v1/health

          echo "=== DONE ==="
          SCRIPT
          chmod +x /tmp/deploy.sh'

          # 然后执行脚本
          sshpass -p '${{ secrets.SERVER_SSH_PASSWORD }}' \
            ssh -o StrictHostKeyChecking=no -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash /tmp/deploy.sh'
